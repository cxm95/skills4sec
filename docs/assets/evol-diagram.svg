<svg viewBox="0 0 960 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Memento-S 技能自进化闭环流程图：执行阶段、归因阶段、进化阶段">
  <title>Memento-S Skill Self-Evolution Loop</title>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#64748b"/></marker>
    <marker id="ah-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#16a34a"/></marker>
    <marker id="ah-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#dc2626"/></marker>
    <marker id="ah-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#2563eb"/></marker>
    <linearGradient id="gExec" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f3e8ff"/><stop offset="100%" stop-color="#ede9fe"/></linearGradient>
    <linearGradient id="gAttr" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e0f2fe"/><stop offset="100%" stop-color="#dbeafe"/></linearGradient>
    <linearGradient id="gEvol" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#dcfce7"/><stop offset="100%" stop-color="#d1fae5"/></linearGradient>
  </defs>

  <!-- ====== Phase 1: Execution (left) ====== -->
  <rect x="10" y="10" width="295" height="320" rx="16" fill="url(#gExec)" stroke="#c4b5fd" stroke-width="1"/>
  <text x="30" y="36" font-size="11" fill="#7c3aed" font-weight="600">EXECUTION PHASE</text>

  <!-- Task Executor -->
  <rect x="30" y="52" width="150" height="40" rx="10" fill="#fff" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="60" y="77" font-size="12" fill="#1e1b4b" font-weight="500">Task Executor</text>
  <text x="38" y="74" font-size="14">⚙️</text>

  <!-- Executor -> Judge -->
  <line x1="180" y1="72" x2="180" y2="108" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Answer Judge -->
  <rect x="105" y="110" width="150" height="40" rx="10" fill="#fff" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="137" y="135" font-size="12" fill="#1e1b4b" font-weight="500">Answer Judge</text>
  <text x="113" y="132" font-size="14">🔍</text>

  <!-- Judge -> Diamond -->
  <line x1="180" y1="150" x2="180" y2="170" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Diamond: Correct? -->
  <polygon points="180,172 212,195 180,218 148,195" fill="#fff" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="162" y="199" font-size="10" fill="#1e1b4b" font-weight="500">Correct?</text>

  <!-- YES -> Log Success -->
  <line x1="148" y1="195" x2="100" y2="195" stroke="#16a34a" stroke-width="1.5" marker-end="url(#ah-g)"/>
  <text x="108" y="188" font-size="9" fill="#16a34a" font-weight="600">YES</text>
  <rect x="22" y="180" width="78" height="30" rx="7" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="28" y="199" font-size="10" fill="#166534" font-weight="500">Log Success</text>

  <!-- NO -> down to cross-phase arrow -->
  <line x1="180" y1="218" x2="180" y2="280" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ah-r)"/>
  <text x="186" y="248" font-size="9" fill="#dc2626" font-weight="600">NO</text>

  <!-- "NO" exit point (bottom of Phase 1) -->
  <rect x="130" y="280" width="100" height="30" rx="7" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="145" y="299" font-size="10" fill="#991b1b" font-weight="500">Fail Record</text>

  <!-- ====== Phase 1 -> Phase 2 arrow ====== -->
  <line x1="230" y1="295" x2="318" y2="295" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ah-r)"/>

  <!-- ====== Phase 2: Attribution (middle) ====== -->
  <rect x="320" y="10" width="295" height="320" rx="16" fill="url(#gAttr)" stroke="#93c5fd" stroke-width="1"/>
  <text x="340" y="36" font-size="11" fill="#2563eb" font-weight="600">ATTRIBUTION PHASE</text>

  <!-- Failure Attribution -->
  <rect x="340" y="52" width="170" height="40" rx="10" fill="#fff" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="372" y="77" font-size="12" fill="#1e3a5f" font-weight="500">Failure Attribution</text>
  <text x="348" y="74" font-size="14">🎯</text>

  <!-- Attribution -> Tracker -->
  <line x1="425" y1="92" x2="425" y2="118" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Utility Tracker -->
  <rect x="340" y="120" width="170" height="40" rx="10" fill="#fff" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="372" y="145" font-size="12" fill="#1e3a5f" font-weight="500">Utility Tracker</text>
  <text x="348" y="142" font-size="14">📊</text>

  <!-- Tracker -> Diamond -->
  <line x1="425" y1="160" x2="425" y2="178" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Diamond: Decision -->
  <polygon points="425,180 460,205 425,230 390,205" fill="#fff" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="406" y="209" font-size="10" fill="#1e3a5f" font-weight="500">Decision</text>

  <!-- OPTIMIZE (left branch) -->
  <line x1="390" y1="205" x2="348" y2="205" stroke="#2563eb" stroke-width="1.5"/>
  <line x1="348" y1="205" x2="348" y2="260" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ah-b)"/>
  <text x="349" y="200" font-size="9" fill="#2563eb" font-weight="600">OPT</text>

  <!-- DISCOVER (right branch) -->
  <line x1="460" y1="205" x2="502" y2="205" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="502" y1="205" x2="502" y2="260" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ah-b)"/>
  <text x="465" y="200" font-size="9" fill="#2563eb" font-weight="600">DISC</text>

  <!-- Merge: both branches go to output -->
  <rect x="340" y="262" width="170" height="34" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="355" y="283" font-size="10" fill="#4f46e5" font-weight="500">Optimize / Discover</text>

  <!-- ====== Phase 2 -> Phase 3 arrow ====== -->
  <line x1="510" y1="279" x2="628" y2="279" stroke="#2563eb" stroke-width="1.5" marker-end="url(#ah-b)"/>

  <!-- ====== Phase 3: Evolution (right) ====== -->
  <rect x="630" y="10" width="320" height="320" rx="16" fill="url(#gEvol)" stroke="#86efac" stroke-width="1"/>
  <text x="650" y="36" font-size="11" fill="#16a34a" font-weight="600">EVOLUTION PHASE</text>

  <!-- LLM Skill Rewriter -->
  <rect x="660" y="52" width="170" height="40" rx="10" fill="#fff" stroke="#4ade80" stroke-width="1.5"/>
  <text x="692" y="77" font-size="12" fill="#14532d" font-weight="500">LLM Skill Rewriter</text>
  <text x="668" y="74" font-size="14">✏️</text>

  <!-- Rewriter -> Test Gate -->
  <line x1="745" y1="92" x2="745" y2="118" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Unit Test Gate -->
  <rect x="660" y="120" width="170" height="40" rx="10" fill="#fff" stroke="#4ade80" stroke-width="1.5"/>
  <text x="692" y="145" font-size="12" fill="#14532d" font-weight="500">Unit Test Gate</text>
  <text x="668" y="142" font-size="14">🧪</text>

  <!-- Test Gate -> Diamond -->
  <line x1="745" y1="160" x2="745" y2="178" stroke="#64748b" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- Diamond: Pass? -->
  <polygon points="745,180 780,205 745,230 710,205" fill="#fff" stroke="#4ade80" stroke-width="1.5"/>
  <text x="732" y="209" font-size="10" fill="#14532d" font-weight="500">Pass?</text>

  <!-- PASS -> Retry Task -->
  <line x1="780" y1="205" x2="838" y2="205" stroke="#16a34a" stroke-width="1.5" marker-end="url(#ah-g)"/>
  <text x="792" y="198" font-size="9" fill="#16a34a" font-weight="600">PASS</text>
  <rect x="840" y="190" width="90" height="30" rx="7" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="852" y="210" font-size="10" fill="#166534" font-weight="500">Retry Task</text>

  <!-- FAIL -> Rollback -->
  <line x1="745" y1="230" x2="745" y2="262" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ah-r)"/>
  <text x="752" y="250" font-size="9" fill="#dc2626" font-weight="600">FAIL</text>
  <rect x="695" y="264" width="100" height="30" rx="7" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="712" y="283" font-size="10" fill="#991b1b" font-weight="500">Rollback ⏪</text>

  <!-- Retry -> back to Task Executor (top loop) -->
  <path d="M930,205 L940,205 L940,4 L105,4 L105,50" stroke="#64748b" stroke-width="1.2" fill="none" stroke-dasharray="5 3" marker-end="url(#ah)"/>
</svg>
